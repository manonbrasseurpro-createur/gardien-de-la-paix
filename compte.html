<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte | Entraînement concours gardien de la paix</title>
  <meta name="description" content="Créez votre compte pour accéder à l'entraînement gardien de la paix en ligne : cas pratiques GPX, psychotechnique, culture générale et test personnalité.">
  <meta name="keywords" content="entraînement gardien de la paix, concours gardien de la paix, s'entraîner concours GPX en ligne, entraînement gratuit concours gardien de la paix">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="fr_FR">
  <meta property="og:title" content="Compte entraînement concours GPX">
  <meta property="og:description" content="Inscription pour la préparation concours gardien de la paix en ligne.">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="style.css">
  <script src="site-seo.js"></script>
</head>
<body class="auth-page">
  <header class="hero hero--compact">
    <div class="hero__content">
      <p class="hero__label">Concours Gardien de la Paix</p>
      <h1>Mon compte</h1>
      <p class="hero__subtitle" id="hero-subtitle">Créez un compte pour accéder aux entraînements</p>
    </div>
  </header>

  <main class="container auth-container">
    <section id="logged-in-view" class="auth-card auth-card--wide hidden" aria-label="Tableau de bord">
      <h2>Bonjour, <span id="user-display-name"></span></h2>
      <p id="subscription-status" class="auth-status"></p>
      <p id="trial-status" class="auth-status"></p>
      <div class="auth-actions">
        <a class="primary-button" href="index.html">Accéder aux modules</a>
        <a class="primary-button" href="avis.html">Donner mon avis</a>
        <button id="manage-subscription-button" class="primary-button hidden" type="button">Gérer mon abonnement</button>
        <a class="secondary-button" href="tarifs.html">Voir les tarifs</a>
        <button id="logout-button" class="secondary-button" type="button">Déconnexion</button>
      </div>
      <p id="manage-subscription-error" class="auth-error" role="alert"></p>
      <p id="demo-subscription-hint" class="auth-hint hidden"></p>
      <button id="demo-subscription-button" class="secondary-button hidden" type="button">Activer l'abonnement démo (mode local)</button>
    </section>

    <p class="auth-footer">
      <a href="index.html">Retour à l'accueil</a> · <a href="tarifs.html">Tarifs et abonnement</a>
    </p>
  </main>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"></script>
  <script src="auth-service.js"></script>
  <script src="stripe-service.js"></script>
  <script src="access-control.js"></script>
  <script>
    console.info("[GPX Auth] Diagnostic au chargement:", window.GPXAuth.getDiagnostics());

    const loggedInView = document.getElementById("logged-in-view");
    const demoButton = document.getElementById("demo-subscription-button");
    const demoHint = document.getElementById("demo-subscription-hint");

    async function refreshDashboard() {
      const user = await window.GPXAuth.getCurrentUser();
      if (!user) {
        window.location.href = "connexion.html";
        return;
      }

      loggedInView.classList.remove("hidden");
      document.getElementById("user-display-name").textContent = [user.firstName, user.lastName].filter(Boolean).join(" ");
      document.getElementById("hero-subtitle").textContent = "Gérez votre compte et votre abonnement";

      const subscribed = window.GPXAuth.hasActiveSubscription(user);
      document.getElementById("subscription-status").textContent = subscribed
        ? "Abonnement actif — accès illimité à tous les tests et simulations."
        : "Pas d'abonnement actif — accès limité à un petit test gratuit.";

      const manageBtn = document.getElementById("manage-subscription-button");
      manageBtn.classList.toggle("hidden", !subscribed);

      const trialEl = document.getElementById("trial-status");
      if (subscribed) {
        trialEl.textContent = "";
      } else {
        trialEl.textContent = user.freeTrialUsed
          ? `Essai gratuit utilisé (${user.freeTrialKey || "test enregistré"}).`
          : "Essai gratuit disponible : choisissez un mini test ou une question isolée (cas pratiques).";
      }
    }

    document.getElementById("manage-subscription-button").addEventListener("click", async () => {
      const btn = document.getElementById("manage-subscription-button");
      const errorEl = document.getElementById("manage-subscription-error");
      errorEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Redirection…";
      try {
        await window.GPXStripe.startPortalSession();
      } catch (error) {
        errorEl.textContent = error.message || "Impossible d'accéder au portail Stripe.";
        btn.disabled = false;
        btn.textContent = "Gérer mon abonnement";
      }
    });

    document.getElementById("logout-button").addEventListener("click", async () => {
      await window.GPXAuth.logout();
      await refreshDashboard();
    });

    demoButton.addEventListener("click", async () => {
      const user = await window.GPXAuth.getCurrentUser();
      if (!user) {
        return;
      }
      await window.GPXAuth.activateDemoSubscription(user.id);
      await refreshDashboard();
    });

    refreshDashboard();
  </script>
</body>
</html>
