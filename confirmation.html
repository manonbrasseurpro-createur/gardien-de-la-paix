<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement confirmé — Gardien de la Paix</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link id="gpx-fonts-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@1,600&family=Spectral:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap">
  <script src="site-seo.js"></script>
</head>
<body class="auth-page">
  <header class="hero hero--compact">
    <div class="hero__content">
      <p class="hero__label">Abonnement</p>
      <h1>Paiement confirmé</h1>
      <p class="hero__subtitle">Merci pour votre abonnement</p>
    </div>
  </header>

  <main class="container auth-container">
    <section class="auth-card auth-card--wide" aria-live="polite">
      <h2>✅ Votre paiement a été accepté</h2>
      <p id="confirmation-message">
        Vérification de votre abonnement…
      </p>
      <p id="subscription-detail" class="auth-status"></p>
      <p id="confirmation-error" class="auth-error" role="alert" hidden></p>
      <div class="auth-actions">
        <a class="primary-button" href="index.html">Commencer l'entraînement</a>
        <a class="secondary-button" href="connexion.html">Mon compte</a>
        <button id="retry-check" class="secondary-button hidden" type="button">Vérifier à nouveau</button>
      </div>
    </section>
  </main>

  <p class="gpx-legal-footer">
    <a href="mentions-legales.html">Mentions légales</a>
    · <a href="cgv.html">CGV</a>
    · <a href="confidentialite.html">Politique de confidentialité</a>
    · <a href="#" data-gpx-manage-cookies>Gérer mes cookies</a>
  </p>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"></script>
  <script src="auth-service.js"></script>
  <script>
    (function () {
      const messageEl = document.getElementById("confirmation-message");
      const detailEl = document.getElementById("subscription-detail");
      const errorEl = document.getElementById("confirmation-error");
      const retryBtn = document.getElementById("retry-check");
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");

      function showError(text) {
        errorEl.hidden = false;
        errorEl.textContent = text;
      }

      async function refreshStatus() {
        errorEl.hidden = true;
        errorEl.textContent = "";

        if (!window.GPXAuth) {
          showError("Erreur de chargement (auth-service.js). Rechargez la page.");
          return false;
        }

        try {
          const user = await window.GPXAuth.getCurrentUser();

          if (!user) {
            messageEl.textContent =
              "Paiement reçu. Connectez-vous avec le même compte utilisé pour payer afin de vérifier l'activation.";
            detailEl.textContent = sessionId
              ? "Référence paiement Stripe enregistrée."
              : "";
            retryBtn.classList.remove("hidden");
            return false;
          }

          const active = window.GPXAuth.hasActiveSubscription(user);

          if (active) {
            messageEl.textContent =
              "Votre abonnement est actif. Tous les tests et simulations sont débloqués.";
            detailEl.textContent = "Statut : abonnement actif.";
            retryBtn.classList.add("hidden");
            return true;
          }

          messageEl.textContent =
            "Paiement reçu. L'activation peut prendre quelques secondes (webhook Stripe → Supabase).";
          detailEl.textContent = "Si le statut ne change pas, patientez 1 minute puis cliquez sur « Vérifier à nouveau ».";
          retryBtn.classList.remove("hidden");
          return false;
        } catch (error) {
          console.error("[confirmation]", error);
          showError(error.message || "Impossible de vérifier l'abonnement.");
          retryBtn.classList.remove("hidden");
          return false;
        }
      }

      async function pollActivation(maxAttempts) {
        for (let attempt = 0; attempt < maxAttempts; attempt += 1) {
          const active = await refreshStatus();
          if (active) {
            return;
          }
          await new Promise((resolve) => setTimeout(resolve, 3000));
        }
      }

      retryBtn.addEventListener("click", () => {
        messageEl.textContent = "Vérification de votre abonnement…";
        pollActivation(5);
      });

      if (!window.GPXAuth?.isSupabaseConfigured?.()) {
        showError("Supabase n'est pas configuré (supabase-config.js).");
      } else {
        pollActivation(8);
      }
    })();
  </script>
  <script src="cookie-consent.js"></script>
</body>
</html>
