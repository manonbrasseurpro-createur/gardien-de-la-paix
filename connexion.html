<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Se connecter | Entraînement concours gardien de la paix</title>
  <meta name="description" content="Connectez-vous à votre compte pour accéder à l'entraînement gardien de la paix en ligne.">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link id="gpx-fonts-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@1,600&family=Spectral:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap">
  <script src="site-seo.js"></script>
</head>
<body class="auth-page">
  <header class="hero hero--compact">
    <div class="hero__content">
      <p class="hero__label">Concours Gardien de la Paix</p>
      <h1>Se connecter</h1>
      <p class="hero__subtitle">Accédez à vos entraînements</p>
    </div>
  </header>

  <main class="container auth-container">
    <section class="auth-card auth-card--narrow">
      <h2>Connexion</h2>
      <form id="login-form" class="auth-form" novalidate>
        <label>
          Adresse e-mail
          <input type="email" name="email" required autocomplete="email">
        </label>
        <label>
          Mot de passe
          <span class="auth-password-wrap">
            <input type="password" name="password" required autocomplete="current-password">
            <button type="button" class="auth-password-toggle" aria-label="Afficher le mot de passe">
              <svg class="auth-password-icon--shown" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="auth-password-icon--hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 3l18 18"></path>
                <path d="M10.58 10.58a2 2 0 0 0 2.83 2.83"></path>
                <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 10 7 10 7a18.37 18.37 0 0 1-4.12 5.17"></path>
                <path d="M6.12 6.12A18.37 18.37 0 0 0 2 12s3 7 10 7a10.94 10.94 0 0 0 2.91-.39"></path>
              </svg>
            </button>
          </span>
        </label>
        <button class="primary-button" type="submit">Connexion</button>
        <p id="login-error" class="auth-error" role="alert"></p>
      </form>
      <button id="google-signin-btn" type="button" class="secondary-button">Continuer avec Google</button>
      <p class="auth-switch">Pas encore de compte ? <a href="inscription.html">Créer un compte</a></p>
    </section>

    <p class="auth-footer">
      <a href="index.html">Retour à l'accueil</a> · <a href="tarifs.html">Tarifs et abonnement</a>
    </p>
  </main>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"></script>
  <script src="auth-service.js"></script>
  <script src="cookie-consent.js"></script>
  <script src="access-control.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const redirectTarget = params.get("redirect") || "compte.html";

    (async () => {
      if (window.GPXAuth.isSupabaseConfigured()) {
        const user = await window.GPXAuth.getCurrentUser();
        if (user) {
          window.location.href = "compte.html";
          return;
        }
      }
    })();

    document.getElementById("login-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = event.target;
      const errorEl = document.getElementById("login-error");
      errorEl.textContent = "";
      try {
        await window.GPXAuth.login({
          email: form.email.value,
          password: form.password.value
        });
        window.location.href = redirectTarget;
      } catch (error) {
        console.error("[GPX Auth] login failed:", error);
        errorEl.textContent = error.message || "Connexion impossible.";
      }
    });
    document.getElementById("google-signin-btn").addEventListener("click", async () => {
      const errorEl = document.getElementById("login-error");
      errorEl.textContent = "";
      try {
        await window.GPXAuth.loginWithGoogle();
      } catch (error) {
        console.error("[GPX Auth] Google login failed:", error);
        errorEl.textContent = error.message || "Connexion Google impossible.";
      }
    });

    document.querySelectorAll(".auth-password-toggle").forEach((button) => {
      const wrap = button.closest(".auth-password-wrap");
      const input = wrap?.querySelector('input[type="password"], input[type="text"]');
      if (!input) return;

      button.addEventListener("click", () => {
        const visible = input.type === "text";
        input.type = visible ? "password" : "text";
        button.classList.toggle("is-visible", !visible);
        button.setAttribute("aria-label", visible ? "Afficher le mot de passe" : "Masquer le mot de passe");
      });
    });
  </script>
</body>
</html>
